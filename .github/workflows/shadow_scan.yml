name: Unified Dogfooding scans
on:
  schedule:
    # Run nightly at 2 AM UTC (same as Cirrus CI nightly cron)
    - cron: '0 2 * * *'
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - tt/gha-shadow-scan

jobs:
  build:
    runs-on: github-ubuntu-latest-s
    name: Build and run shadow scans
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          version: 2025.7.12
      - uses: SonarSource/ci-github-actions/build-maven@v1
        with:
          artifactory-reader-role: private-reader    # Override default public-reader
          artifactory-deployer-role: qa-deployer     # Override default public-deployer
          run-shadow-scans: true
          maven-opts: "-Dsonar.organization=sonarsource"

      - name: Run IRIS Analysis
        uses: SonarSource/unified-dogfooding-actions/run-iris@v1
        with:
          primary_project_key: "SonarSource_sonar-java-jdt"
          primary_platform: "SQC-EU"
          shadow1_project_key: "SonarSource_sonar-java-jdt"
          shadow1_platform: "Next"
          shadow2_project_key: "SonarSource_sonar-java-jdt"
          shadow2_platform: "SQC-US"